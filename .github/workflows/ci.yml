name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,openai,anthropic]"

      - name: Lint
        run: ruff check neuromem tests --ignore F401

      - name: Type check
        run: mypy neuromem --ignore-missing-imports

      - name: Test
        run: pytest --cov=neuromem --cov-report=term-missing --cov-fail-under=100
