<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="iconGlow" cx="256" cy="320" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0d0d0d"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="320" rx="320" ry="300" fill="url(#iconGlow)"/>

  <!-- Top/bottom accent lines -->
  <rect x="0" y="0" width="1280" height="2" fill="#a855f7" opacity="0.5"/>
  <rect x="0" y="638" width="1280" height="2" fill="#a855f7" opacity="0.12"/>

  <!-- === LEFT: Neural network icon === -->

  <!-- Connection lines (drawn first, behind nodes) -->
  <g stroke="#a855f7" stroke-width="1.2" opacity="0.25">
    <!-- Layer 1 to Layer 2 -->
    <line x1="160" y1="220" x2="256" y2="260"/>
    <line x1="160" y1="220" x2="256" y2="340"/>
    <line x1="160" y1="320" x2="256" y2="260"/>
    <line x1="160" y1="320" x2="256" y2="340"/>
    <line x1="160" y1="320" x2="256" y2="420"/>
    <line x1="160" y1="420" x2="256" y2="340"/>
    <line x1="160" y1="420" x2="256" y2="420"/>
    <!-- Layer 2 to Layer 3 -->
    <line x1="256" y1="260" x2="352" y2="240"/>
    <line x1="256" y1="260" x2="352" y2="340"/>
    <line x1="256" y1="340" x2="352" y2="240"/>
    <line x1="256" y1="340" x2="352" y2="340"/>
    <line x1="256" y1="340" x2="352" y2="440"/>
    <line x1="256" y1="420" x2="352" y2="340"/>
    <line x1="256" y1="420" x2="352" y2="440"/>
  </g>

  <!-- Pulsing connection highlights -->
  <g stroke="#a855f7" stroke-width="2" opacity="0.5" filter="url(#bigGlow)">
    <line x1="160" y1="320" x2="256" y2="260"/>
    <line x1="256" y1="260" x2="352" y2="340"/>
    <line x1="160" y1="420" x2="256" y2="340"/>
  </g>

  <!-- Layer 1 nodes (input) -->
  <g filter="url(#glow)">
    <circle cx="160" cy="220" r="14" fill="#0d0d0d" stroke="#a855f7" stroke-width="2"/>
    <circle cx="160" cy="220" r="6" fill="#a855f7" opacity="0.4"/>
    <circle cx="160" cy="320" r="18" fill="#0d0d0d" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="160" cy="320" r="8" fill="#a855f7" opacity="0.6"/>
    <circle cx="160" cy="420" r="14" fill="#0d0d0d" stroke="#a855f7" stroke-width="2"/>
    <circle cx="160" cy="420" r="6" fill="#a855f7" opacity="0.4"/>
  </g>

  <!-- Layer 2 nodes (hidden) -->
  <g filter="url(#glow)">
    <circle cx="256" cy="260" r="16" fill="#0d0d0d" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="256" cy="260" r="7" fill="#a855f7" opacity="0.5"/>
    <circle cx="256" cy="340" r="20" fill="#0d0d0d" stroke="#a855f7" stroke-width="3"/>
    <circle cx="256" cy="340" r="10" fill="#a855f7" opacity="0.7"/>
    <circle cx="256" cy="420" r="14" fill="#0d0d0d" stroke="#a855f7" stroke-width="2"/>
    <circle cx="256" cy="420" r="6" fill="#a855f7" opacity="0.4"/>
  </g>

  <!-- Layer 3 nodes (output) -->
  <g filter="url(#glow)">
    <circle cx="352" cy="240" r="14" fill="#0d0d0d" stroke="#a855f7" stroke-width="2"/>
    <circle cx="352" cy="240" r="6" fill="#a855f7" opacity="0.4"/>
    <circle cx="352" cy="340" r="17" fill="#0d0d0d" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="352" cy="340" r="8" fill="#a855f7" opacity="0.55"/>
    <circle cx="352" cy="440" r="13" fill="#0d0d0d" stroke="#a855f7" stroke-width="2"/>
    <circle cx="352" cy="440" r="5" fill="#a855f7" opacity="0.35"/>
  </g>

  <!-- Floating data particles -->
  <g fill="#a855f7" opacity="0.3">
    <circle cx="110" cy="270" r="2"/>
    <circle cx="200" cy="200" r="1.5"/>
    <circle cx="300" cy="280" r="2"/>
    <circle cx="390" cy="300" r="1.5"/>
    <circle cx="130" cy="380" r="1.5"/>
    <circle cx="310" cy="460" r="2"/>
    <circle cx="210" cy="440" r="1"/>
    <circle cx="380" cy="400" r="1"/>
  </g>

  <!-- === RIGHT SIDE: Text === -->

  <!-- Tool name -->
  <text x="540" y="250" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="72" font-weight="700" fill="#a855f7" letter-spacing="-2">
    neuromem
  </text>

  <!-- Underline accent -->
  <rect x="540" y="268" width="160" height="3" rx="1.5" fill="#a855f7" opacity="0.5"/>

  <!-- Tagline -->
  <text x="540" y="315" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="24" fill="#cccccc" letter-spacing="0.5">
    Smart context management for LLM agents
  </text>

  <!-- Stats -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="15" fill="#666666">
    <circle cx="548" cy="380" r="3" fill="#a855f7" opacity="0.6"/>
    <text x="560" y="384">Claude + GPT</text>
    <circle cx="548" cy="412" r="3" fill="#a855f7" opacity="0.6"/>
    <text x="560" y="416">Zero Dependencies</text>
    <circle cx="548" cy="444" r="3" fill="#a855f7" opacity="0.6"/>
    <text x="560" y="448">LangChain Ready</text>
  </g>

  <!-- Separator -->
  <line x1="540" y1="490" x2="1100" y2="490" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Footer -->
  <text x="540" y="530" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" fill="#444444" letter-spacing="2">
    speed785.github.io
  </text>

  <!-- Corner decorations -->
  <g stroke="#a855f7" stroke-width="1" opacity="0.2">
    <path d="M 20 20 L 20 50"/>
    <path d="M 20 20 L 50 20"/>
    <path d="M 1260 20 L 1260 50"/>
    <path d="M 1260 20 L 1230 20"/>
    <path d="M 20 620 L 20 590"/>
    <path d="M 20 620 L 50 620"/>
    <path d="M 1260 620 L 1260 590"/>
    <path d="M 1260 620 L 1230 620"/>
  </g>

  <!-- Noise overlay -->
  <rect width="1280" height="640" filter="url(#noise)" opacity="0.5"/>
</svg>